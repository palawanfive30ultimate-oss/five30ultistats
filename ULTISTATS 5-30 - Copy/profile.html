<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile | 5:30 UltiStats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <header class="bg-gradient-to-r from-pink-600 to-purple-600 text-white py-4 px-6 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <button onclick="window.location.href='index.html'" class="flex items-center gap-2 hover:text-pink-200 transition-colors font-semibold text-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back
            </button>
            <h1 class="font-bold tracking-wider text-lg">PLAYER PROFILE</h1>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 mt-6">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            
            <div class="bg-slate-800 p-8 text-center relative">
                <div class="relative z-10 flex flex-col items-center">
                    <img id="profileImage" src="" alt="Profile" class="w-40 h-40 rounded-full border-4 border-white shadow-lg object-cover bg-white">
                    <h2 id="playerName" class="text-4xl font-black text-white mt-4 tracking-tight">Loading...</h2>
                    <span id="playerDivision" class="mt-4 px-5 py-2 bg-white/20 rounded-full text-sm font-bold text-white uppercase tracking-wider border border-white/30">---</span>
                </div>
            </div>

            <div class="p-6 md:p-8">
                <h3 class="text-2xl font-black text-slate-800 mb-6 border-b-2 border-slate-200 pb-2">🌟 OVERALL CAREER STATS</h3>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                    <div class="flex flex-col items-center justify-center p-6 bg-blue-50 rounded-xl border-2 border-blue-100 shadow-sm">
                        <span id="totalGoals" class="text-5xl font-black text-blue-600">0</span>
                        <span class="text-sm font-bold text-slate-500 uppercase mt-2">Total Goals</span>
                    </div>

                    <div class="flex flex-col items-center justify-center p-6 bg-green-50 rounded-xl border-2 border-green-100 shadow-sm">
                        <span id="totalAssists" class="text-5xl font-black text-green-600">0</span>
                        <span class="text-sm font-bold text-slate-500 uppercase mt-2">Total Assists</span>
                    </div>

                    <div class="flex flex-col items-center justify-center p-6 bg-red-50 rounded-xl border-2 border-red-100 shadow-sm">
                        <span id="totalBlocks" class="text-5xl font-black text-red-600">0</span>
                        <span class="text-sm font-bold text-slate-500 uppercase mt-2">Total Blocks</span>
                    </div>

                    <div class="flex flex-col items-center justify-center p-6 bg-purple-50 rounded-xl border-2 border-purple-100 shadow-sm transform md:scale-105">
                        <span id="totalScore" class="text-5xl font-black text-purple-700">0</span>
                        <span class="text-sm font-bold text-purple-600 uppercase mt-2">Total Stats</span>
                    </div>
                </div>

                <div class="mt-10">
                    <h4 class="text-lg font-bold text-slate-500 uppercase mb-4">Averages (Per Game)</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col items-center p-4 bg-white rounded-xl border-2 border-slate-200 shadow-sm"><span id="avgGoals" class="text-3xl font-black text-slate-700">0.0</span><span class="text-xs text-slate-400 font-bold uppercase mt-1">Avg Goals</span></div>
                        <div class="flex flex-col items-center p-4 bg-white rounded-xl border-2 border-slate-200 shadow-sm"><span id="avgAssists" class="text-3xl font-black text-slate-700">0.0</span><span class="text-xs text-slate-400 font-bold uppercase mt-1">Avg Assists</span></div>
                    </div>
                </div>

                <div class="mt-12">
                    <div class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                        
                        <div class="bg-slate-800 text-white p-4">
                            <h2 class="font-bold text-lg uppercase tracking-wide">🏆 TOURNAMENT HISTORY</h2>
                        </div>
                        
                        <div class="overflow-x-auto w-full">
                            <table class="w-full text-left border-collapse whitespace-nowrap">
                                <thead>
                                    <tr class="bg-slate-100 border-b border-slate-200 text-slate-600 text-sm md:text-base">
                                        <th class="p-3 md:p-4 font-semibold">Event</th>
                                        <th class="p-3 md:p-4 font-semibold">Team</th>
                                        <th class="p-3 md:p-4 font-semibold text-center text-blue-600" title="Goals">G</th>
                                        <th class="p-3 md:p-4 font-semibold text-center text-green-600" title="Assists">A</th>
                                        <th class="p-3 md:p-4 font-semibold text-center text-red-500" title="Blocks">B</th>
                                        <th class="p-3 md:p-4 font-semibold text-center text-slate-500 text-xs md:text-sm">AVG G</th>
                                        <th class="p-3 md:p-4 font-semibold text-center text-slate-500 text-xs md:text-sm">AVG A</th>
                                    </tr>
                                </thead>
                                <tbody id="tournamentListBody">
                                    <tr><td colspan="7" class="p-4 text-center text-slate-500 italic">Naglo-load ng tournaments...</td></tr>
                                </tbody>
                            </table>
                        </div> </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const sheetCSVLink = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIAvXx5NvhKIc-u65685vUfgaFyqi7b2-BqJcbmBCotq3oZ8rQgl3YqvYgi6cwsyfHTbWS5HNIjycW/pub?gid=1379559004&single=true&output=csv'; 
        const noCache = "&nocache=" + new Date().getTime();

        const urlParams = new URLSearchParams(window.location.search);
        const targetPlayer = urlParams.get('player');

        if (!targetPlayer) {
            document.getElementById('playerName').innerText = "Walang napiling player";
            document.getElementById('tournamentListBody').innerHTML = '<tr><td colspan="7" class="p-4 text-center text-red-500">Mali ang link. Walang player name na nakita.</td></tr>';
        } else {
            Papa.parse(sheetCSVLink + noCache, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    
                    let totalGoals = 0;
                    let totalAssists = 0;
                    let totalBlocks = 0;
                    let totalGames = 0;
                    
                    let pDiv = "Open";
                    let pPic = "";
                    let tournamentsJoined = [];

                    const searchName = targetPlayer.trim().toLowerCase();

                    results.data.forEach(row => {
                        let cleanRow = {};
                        for (let key in row) {
                            cleanRow[key.trim().toLowerCase()] = row[key];
                        }

                        let rowPlayerName = (cleanRow['player'] || "").trim().toLowerCase();

                        if (rowPlayerName === searchName) {
                            
                            let goals = parseInt(cleanRow['goals'] || cleanRow['goal']) || 0;
                            let assists = parseInt(cleanRow['assists'] || cleanRow['assist']) || 0;
                            let blocks = parseInt(cleanRow['blocks'] || cleanRow['block']) || 0;
                            let games = parseInt(cleanRow['games'] || cleanRow['game']) || 0;

                            totalGoals += goals;
                            totalAssists += assists;
                            totalBlocks += blocks;
                            totalGames += games;

                            let tName = cleanRow['event name'] || cleanRow['tournament name'] || "Unknown Tournament";
                            let tTeam = cleanRow['team'] || "Unknown Team";
                            
                            pDiv = cleanRow['gender'] || pDiv;
                            pPic = cleanRow['picture'] || cleanRow['pic'] || pPic;

                            tournamentsJoined.push({
                                name: tName,
                                team: tTeam,
                                games: games,
                                goals: goals,
                                assists: assists,
                                blocks: blocks
                            });
                        }
                    });

                    document.getElementById('playerName').innerText = targetPlayer;
                    document.getElementById('playerDivision').innerText = pDiv;

                    let avatarColor = pDiv.toLowerCase().includes('girl') ? 'DB2777' : '2563EB';
                    document.getElementById('profileImage').src = pPic ? pPic : `https://ui-avatars.com/api/?name=${encodeURIComponent(targetPlayer)}&background=${avatarColor}&color=fff&size=200`;

                    document.getElementById('totalGoals').innerText = totalGoals;
                    document.getElementById('totalAssists').innerText = totalAssists;
                    document.getElementById('totalBlocks').innerText = totalBlocks;
                    document.getElementById('totalScore').innerText = (totalGoals + totalAssists + totalBlocks);

                    document.getElementById('avgGoals').innerText = totalGames > 0 ? (totalGoals / totalGames).toFixed(1) : "0.0";
                    document.getElementById('avgAssists').innerText = totalGames > 0 ? (totalAssists / totalGames).toFixed(1) : "0.0";

                    const tListBody = document.getElementById('tournamentListBody');
                    tListBody.innerHTML = '';
                    
                    if (tournamentsJoined.length === 0) {
                        tListBody.innerHTML = `<tr><td colspan="7" class="p-6 text-center text-slate-500">Wala pang record ng tournament si ${targetPlayer}.</td></tr>`;
                    } else {
                        tournamentsJoined.reverse().forEach(t => {
                            let tAvgGoals = t.games > 0 ? (t.goals / t.games).toFixed(1) : "0.0";
                            let tAvgAssists = t.games > 0 ? (t.assists / t.games).toFixed(1) : "0.0";

                            tListBody.innerHTML += `
                                <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                    <td class="p-3 md:p-4 font-bold text-slate-800">${t.name}</td>
                                    <td class="p-3 md:p-4 text-slate-600 text-sm md:text-base">${t.team}</td>
                                    <td class="p-3 md:p-4 text-center font-black text-blue-600">${t.goals}</td>
                                    <td class="p-3 md:p-4 text-center font-black text-green-600">${t.assists}</td>
                                    <td class="p-3 md:p-4 text-center font-black text-red-500">${t.blocks}</td>
                                    <td class="p-3 md:p-4 text-center font-bold text-slate-500 bg-slate-50/50">${tAvgGoals}</td>
                                    <td class="p-3 md:p-4 text-center font-bold text-slate-500 bg-slate-50/50">${tAvgAssists}</td>
                                </tr>
                            `;
                        });
                    }
                }
            });
        }
    </script>
</body>
</html>
