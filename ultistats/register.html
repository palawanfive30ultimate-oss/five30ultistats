<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Registration - Palawan Five30</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0a0a0c; color: white; display: flex; justify-content: center; padding: 2rem; }
        .register-container { background: #1c1c22; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; border: 1px solid #2a2a35; }
        .register-container h2 { text-align: center; color: #ff2a4b; margin-bottom: 1.5rem; border-bottom: 2px solid #ff2a4b; padding-bottom: 0.5rem; text-transform: uppercase; }
        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; color: #8b8b93; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 6px; font-size: 1rem; }
        input:focus { outline: none; border-color: #ff2a4b; box-shadow: 0 0 5px rgba(255, 42, 75, 0.3); }
        .account-section { margin-top: 2rem; padding-top: 1rem; border-top: 1px dashed #333; }
        .account-section h3 { font-size: 1rem; color: #5c2cff; margin-bottom: 1rem; text-transform: uppercase; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #ff2a4b, #5c2cff); color: white; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 1.5rem; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; }
        #statusMessage { text-align: center; margin-top: 1rem; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Player Registration</h2>
        <form id="registerForm">
            
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" id="firstName" required placeholder="Juan">
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" id="lastName" required placeholder="Dela Cruz">
                </div>
            </div>

            <div class="form-group">
                <label>Nickname</label>
                <input type="text" id="nickname" placeholder="e.g. JD">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Birthdate *</label>
                    <input type="date" id="birthdate" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" readonly placeholder="Auto-calc" style="background: #222; color: #888;">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Contact Number *</label>
                    <input type="text" id="contact" required placeholder="09xxxxxxxxx">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="juan@email.com">
                </div>
            </div>

            <div class="form-group">
                <label>Social Media Link (FB/IG)</label>
                <input type="text" id="social" placeholder="facebook.com/juandelacruz">
            </div>

            <div class="account-section">
                <h3>Login Credentials</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" id="username" required placeholder="For login">
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" id="password" required placeholder="Min. 6 chars">
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn">Create Account & Register</button>
            <p id="statusMessage"></p>
        </form>
    </div>

    <script>
        // AUTO COMPUTE AGE
        document.getElementById('birthdate').addEventListener('change', function() {
            let dob = new Date(this.value);
            let today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            let m = today.getMonth() - dob.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) { age--; }
            document.getElementById('age').value = age;
        });

        // SUBMIT DATA
        const API_URL = 'https://script.google.com/macros/s/AKfycbydU4RHhMjL71sLZCGoHzs_xmpN_0e4OXqfMInRp5xBcy2CjjQqz4HvtoSxcFROiTka/exec'; 
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.innerHTML = "Processing... ⏳";
            btn.disabled = true;

            const payload = {
                action: "register_user",
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                nickname: document.getElementById('nickname').value,
                birthdate: document.getElementById('birthdate').value,
                age: document.getElementById('age').value,
                contact: document.getElementById('contact').value,
                email: document.getElementById('email').value,
                social: document.getElementById('social').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (result.status === "success") {
                    statusMsg.style.color = "#00ff88";
                    statusMsg.innerText = "✅ Account Created! You can now login.";
                    statusMsg.style.display = "block";
                    form.reset();
                    setTimeout(() => { window.location.href = "index.html"; }, 2000);
                } else {
                    statusMsg.style.color = "#ff2a4b";
                    statusMsg.innerText = "❌ " + result.message;
                    statusMsg.style.display = "block";
                }
            } catch (error) {
                statusMsg.style.color = "#ff2a4b";
                statusMsg.innerText = "❌ Error connecting to database.";
                statusMsg.style.display = "block";
            } finally {
                btn.innerHTML = "Create Account & Register";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
